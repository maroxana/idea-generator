<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shakespearean Insult Generator</title>
  <meta name="description" content="Shakespearean Insult Generator: craft dramatic Elizabethan insults with copy-to-clipboard, text-to-speech, and share tools.">
  <meta name="theme-color" content="#18140f">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Shakespearean Insult Generator">
  <meta property="og:description" content="Summon dramatic Elizabethan insults in mild, dramatic, or royal tones.">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <main class="app">
    <a class="back-home" href="../">&larr; All Apps</a>
    <h1>Shakespearean Insult Generator</h1>
    <p class="subtitle">Speaketh thy mind in proper Elizabethan fashion.</p>

    <section id="insultBox" class="insult-box" aria-live="polite">
      Press Generate Insult to summon thy first rebuke.
    </section>

    <div class="toolbar">
      <button id="generateBtn" class="primary" type="button">Generate Insult</button>
      <button id="copyBtn" type="button">Copy to Clipboard</button>
      <button id="generateTenBtn" type="button">Generate 10 Insults</button>
      <button id="tweetBtn" type="button">Tweet this insult</button>
      <button id="speakBtn" type="button">Speak Insult</button>
    </div>

    <div class="toolbar-secondary">
      <label for="modeSelect">Tone:</label>
      <select id="modeSelect" aria-label="Insult style">
        <option value="mild">Mild insults</option>
        <option value="dramatic">Dramatic insults</option>
        <option value="royal">Royal insults</option>
      </select>
      <button id="clearHistoryBtn" class="danger" type="button">Clear History</button>
    </div>

    <p class="stats">Insults generated this session: <strong id="count">0</strong></p>
    <p id="message" class="message" aria-live="polite"></p>

    <section class="history-wrap">
      <h2 class="history-title">Last 10 Insults</h2>
      <ul id="historyList" class="history"></ul>
    </section>
  </main>

  <script src="assets/app.js" defer></script>
</body>
</html>
