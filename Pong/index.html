<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pong Wall Run</title>
  <meta name="description" content="Pong Wall Run: a one-minute retro arcade score-attack game. Bounce balls through a shrinking wall gap using mouse, touch, trackpad, or arrow keys.">
  <meta name="theme-color" content="#1a1a1a">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Pong Wall Run">
  <meta property="og:description" content="A one-minute retro arcade score-attack game with a shrinking wall gap.">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="shell">
    <canvas id="game"></canvas>
    <div class="flash" id="flash"></div>

    <div class="hud" aria-live="polite">
      <div>
        Time
        <strong id="time">60</strong>
      </div>
      <div style="text-align:right;">
        Score
        <strong id="score">0</strong>
      </div>
    </div>

    <div class="center-overlay">
      <div class="panel" id="gameOverPanel" role="dialog" aria-modal="true" aria-labelledby="finalScoreTitle">
        <h1 id="finalScoreTitle">Time</h1>
        <p id="finalScoreText"></p>
        <button id="restartButton" type="button">Play Again</button>
      </div>
    </div>

    <div class="help">Move with mouse, finger, trackpad, or arrow keys</div>
  </div>

  <script src="assets/app.js" defer></script>
</body>
</html>
